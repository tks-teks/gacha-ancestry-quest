server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_types text/plain text/css application/json application/javascript
             application/xml text/xml image/svg+xml application/wasm;
  gzip_min_length 1024;

  # Cache des assets versionnés (Vite hash)
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Modèles 3D (.glb/.usdz) servis avec bons MIME
  location ~* \.(glb|gltf)$ { types { } default_type model/gltf-binary; }
  location ~* \.usdz$       { types { } default_type model/vnd.usdz+zip; }

  # SPA fallback (React Router)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Sécurité
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
